<!-- Static skeleton so Netlify's build bot can detect the form at deploy time.
     The real form is rendered by React in src/routes/contact.tsx and submits here via AJAX. -->
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="name" />
      <input name="email" type="email" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
